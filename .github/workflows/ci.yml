name: CI - Calculadora de Juros

# ─── Formas de disparo ────────────────────────────────────────────────────────

on:
  # 1. A partir de push (em qualquer branch)
  push:
    branches:
      - main
      - master
      - "**"

  # 2. Pull Request
  pull_request:
    branches:
      - main
      - master

  # 3. Agendado — todo dia às 06:00 UTC (03:00 BRT)
  schedule:
    - cron: "0 6 * * *"

  # 4. Manual — via aba "Actions" no GitHub
  workflow_dispatch:
    inputs:
      ambiente:
        description: "Ambiente de execução"
        required: false
        default: "desenvolvimento"
        type: choice
        options:
          - desenvolvimento
          - homologacao

# ─── Jobs ─────────────────────────────────────────────────────────────────────

jobs:
  # ── Job 1: Testes Unitários (Mocha + Chai) ──────────────────────────────────
  testes-unitarios:
    name: "Testes Unitários (Mocha)"
    runs-on: ubuntu-latest

    steps:
      - name: " Checkout do repositório"
        uses: actions/checkout@v4

      - name: "Configurar Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: "Instalar dependências"
        run: npm ci

      - name: " Executar testes unitários"
        run: npm run test:unit -- --reporter spec --reporter-option output=reports/mocha-report.txt

      - name: "Gerar relatório Mocha (JSON)"
        if: always()
        run: |
          mkdir -p reports
          npm run test:unit -- --reporter json > reports/mocha-results.json || true

      - name: " Fazer upload do relatório Mocha"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-mocha
          path: reports/
          retention-days: 30

  # ── Job 2: Testes E2E (Playwright) ──────────────────────────────────────────
  testes-e2e:
    name: "Testes E2E (Playwright)"
    runs-on: ubuntu-latest
    needs: testes-unitarios

    steps:
      - name: "Checkout do repositório"
        uses: actions/checkout@v4

      - name: "Configurar Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: " Instalar dependências"
        run: npm ci

      - name: " Instalar browsers do Playwright"
        run: npx playwright install --with-deps chromium

      - name: " Executar testes E2E"
        run: npx playwright test --reporter=html,json
        env:
          PLAYWRIGHT_JSON_OUTPUT_NAME: reports/playwright-results.json

      - name: "Fazer upload do relatório Playwright (HTML)"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-playwright-html
          path: playwright-report/
          retention-days: 30

      - name: "Fazer upload do relatório Playwright (JSON)"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-playwright-json
          path: reports/
          retention-days: 30

  # ── Job 3: Resumo final ──────────────────────────────────────────────────────
  resumo:
    name: "Resumo da Pipeline"
    runs-on: ubuntu-latest
    needs: [testes-unitarios, testes-e2e]
    if: always()

    steps:
      - name: " Verificar resultado dos jobs"
        run: |
          echo "##  Resumo da Execução" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Testes Unitários (Mocha) | ${{ needs.testes-unitarios.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Testes E2E (Playwright)  | ${{ needs.testes-e2e.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Executado em: $(date -u '+%d/%m/%Y %H:%M UTC')" >> $GITHUB_STEP_SUMMARY

  # ── Job 4: Gerar Evidência ───────────────────────────────────────────────────
  gerar-evidencia:
    name: "Gerar Relatório de Evidência"
    runs-on: ubuntu-latest
    needs: [testes-unitarios, testes-e2e]
    if: always()
    steps:
      - name: "Criar arquivo de evidência"
        run: |
          echo "# 📄 Evidência de Execução da Pipeline" > evidencia.md
          echo "- **Data e Hora da Execução:** $(date -d '-3 hours' +'%d/%m/%Y %H:%M:%S') (Horário de Brasília)" >> evidencia.md
          echo "- **Gatilho (Trigger):** ${{ github.event_name }}" >> evidencia.md
          echo "- **ID da Execução (Run ID):** ${{ github.run_id }}" >> evidencia.md
          echo "" >> evidencia.md
          echo "### 🚦 Status dos Jobs" >> evidencia.md
          echo "- **Testes Unitários:** ${{ needs.testes-unitarios.result }}" >> evidencia.md
          echo "- **Testes E2E:** ${{ needs.testes-e2e.result }}" >> evidencia.md
          
      - name: "Upload do Relatório de Evidência"
        uses: actions/upload-artifact@v4
        with:
          name: evidencia-execucao
          path: evidencia.md